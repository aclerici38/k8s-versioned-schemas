---
# renovate: datasource=docker depName=ghcr.io/openebs/charts/openebs
version: 4.4.0
helm:
  chartUrl: oci://ghcr.io/openebs/charts/openebs
  template: true
  requiredValues:
    zfs-localpv:
      enabled: true
      crds:
        csi:
          volumeSnapshots:
            enabled: false
    lvm-localpv:
      enabled: true
    mayastor:
      enabled: true
    openebs-crds:
      csi:
        volumeSnapshots:
          enabled: false      
