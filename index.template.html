<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>k8s-versioned-schemas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; padding: 2rem 1rem; color: #e4e4e7; background: #18181b; display: flex; flex-direction: column; align-items: center; }
    h1 { font-size: 1.4rem; margin-bottom: .25rem; }
    p.sub { color: #a1a1aa; margin-bottom: 1rem; font-size: .9rem; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrapper { display: flex; flex-direction: column; align-items: stretch; }
    #search { padding: .5rem .75rem; margin-bottom: 1rem; background: #27272a; border: 1px solid #3f3f46; border-radius: 6px; color: #e4e4e7; font-size: .9rem; outline: none; }
    #search:focus { border-color: #60a5fa; }
    #search::placeholder { color: #71717a; }
    #no-results { display: none; color: #71717a; padding: 1rem 0; }
    table { border-collapse: collapse; }
    th, td { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid #27272a; }
    th { color: #a1a1aa; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; }
    td:first-child { font-weight: 500; white-space: nowrap; padding-right: 5rem; }
    .schemas { display: none; margin-top: .25rem; padding-left: 1rem; font-size: .85rem; color: #a1a1aa; }
    .schemas.open { display: block; }
    .toggle { cursor: pointer; user-select: none; }
    .toggle::before { content: '\25B8 '; color: #71717a; }
    .toggle.open::before { content: '\25BE '; }
    .copy-btn { cursor: pointer; background: none; border: 1px solid #3f3f46; color: #a1a1aa; border-radius: 4px; padding: 0 .4rem; font-size: .75rem; margin-left: .35rem; vertical-align: middle; }
    .copy-btn:hover { border-color: #60a5fa; color: #60a5fa; }
    .copy-btn.copied { color: #4ade80; border-color: #4ade80; }
    @media (max-width: 600px) {
      td:first-child { padding-right: 1.5rem; }
    }
  </style>
</head>
<body>
  <h1>k8s-versioned-schemas</h1>
  <p class="sub">Versioned JSON schemas for Kubernetes CRDs</p>
  <div class="wrapper">
    <input type="text" id="search" placeholder="Search apps...">
    <div id="no-results">No matching apps found.</div>
    <table>
      <thead><tr><th>App</th><th>Versions</th></tr></thead>
      <tbody>
        <!-- SCHEMA_ROWS -->
      </tbody>
    </table>
  </div>
  <script>
    document.querySelectorAll('.toggle').forEach(el => {
      el.addEventListener('click', () => {
        el.classList.toggle('open');
        el.nextElementSibling.classList.toggle('open');
      });
    });
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const url = location.origin + btn.dataset.url;
        const text = '# yaml-language-server: $schema=' + url;
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = 'copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
        });
      });
    });

    const search = document.getElementById('search');
    const noResults = document.getElementById('no-results');
    const rows = document.querySelectorAll('tbody tr');
    search.addEventListener('input', () => {
      const term = search.value.toLowerCase().trim();
      let visible = 0;
      rows.forEach(row => {
        const app = row.querySelector('td').textContent.toLowerCase();
        const match = !term || app.includes(term);
        row.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      noResults.style.display = visible === 0 ? 'block' : 'none';
    });
  </script>
</body>
</html>
