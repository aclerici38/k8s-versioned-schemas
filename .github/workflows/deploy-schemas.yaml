name: deploy-schemas

on:
  workflow_dispatch:
  workflow_run:
    workflows: [generate-schemas]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Generate latest redirects
        run: |
          for app_dir in schemas/*/; do
            app_name="$(basename "$app_dir")"
            latest="$(ls -d "$app_dir"*/ | xargs -n1 basename | sort -V | tail -1)"
            echo "/${app_name}/latest/* /${app_name}/${latest}/:splat 302"
          done > schemas/_redirects
          echo "Generated _redirects:"
          cat schemas/_redirects

      - name: Generate index.html
        run: |
          rows=""
          for app_dir in schemas/*/; do
            app="$(basename "$app_dir")"
            versions="$(ls -d "$app_dir"*/ | xargs -n1 basename | sort -V)"
            latest="$(echo "$versions" | tail -1)"
            version_links=""
            # latest entry using /latest/ URLs
            latest_schemas=""
            for f in "$app_dir$latest"/*.json; do
              fname="$(basename "$f")"
              url="/${app}/latest/${fname}"
              latest_schemas="${latest_schemas}<div><a href=\"${url}\">${fname}</a><button class=\"copy-btn\" data-url=\"${url}\">copy</button></div>"
            done
            version_links="<div><span class=\"toggle\">latest</span><div class=\"schemas\">${latest_schemas}</div></div>"
            # versioned entries
            for v in $(echo "$versions" | sort -rV); do
              schema_links=""
              for f in "$app_dir$v"/*.json; do
                fname="$(basename "$f")"
                url="/${app}/${v}/${fname}"
                schema_links="${schema_links}<div><a href=\"${url}\">${fname}</a><button class=\"copy-btn\" data-url=\"${url}\">copy</button></div>"
              done
              version_links="${version_links}<div><span class=\"toggle\">${v}</span><div class=\"schemas\">${schema_links}</div></div>"
            done
            rows="${rows}<tr><td>${app}</td><td>${version_links}</td></tr>"
          done
          awk -v rows="$rows" '{gsub(/<!-- SCHEMA_ROWS -->/, rows); print}' index.template.html > schemas/index.html
          echo "Generated index.html"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy schemas/ --project-name=k8s-versioned-schemas
