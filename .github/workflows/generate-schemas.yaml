name: generate-schemas

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      appname:
        description: "App name to generate schemas for. Leave empty for all apps."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-schemas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: github.ref == 'refs/heads/main'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Get Changed Apps
        id: changed-apps
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: apps/*.yaml

      - name: Setup uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          version: "0.10.10"

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Generate Schemas
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          SCHEMA_TARGETS: ${{ inputs.appname && format('apps/{0}.yaml', inputs.appname) || steps.changed-apps.outputs.all_changed_files || 'apps/*.yaml' }}
        run: |
          chmod +x gen-schemas.sh
          ./gen-schemas.sh $SCHEMA_TARGETS

      - name: Get Schema Diff
        if: github.event_name == 'pull_request'
        run: |
          git add -f schemas/
          echo '### Schema Changes' > /tmp/schema-diff.md
          echo '' >> /tmp/schema-diff.md
          STAT=$(git diff --cached --stat=200 -- schemas/)
          if [ -z "$STAT" ]; then
            echo 'No schema changes detected.' >> /tmp/schema-diff.md
          else
            echo '```' >> /tmp/schema-diff.md
            echo "$STAT" >> /tmp/schema-diff.md
            echo '```' >> /tmp/schema-diff.md
          fi
          echo "${{ github.event.pull_request.number }}" > /tmp/pr-number.txt

      - name: Upload Schema Diff
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: schema-diff
          path: |
            /tmp/schema-diff.md
            /tmp/pr-number.txt

      - name: Commit Changed Schemas
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "200541989+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          git add -f schemas/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: update schemas [skip ci]"
            git push
          else
            echo "No new schemas to commit."
          fi
