name: generate-schemas

on:
  push:
    branches: [main]
    paths-ignore: 
      - "schemas/**"
      - "crds/**"
  pull_request:
  workflow_dispatch:
    inputs:
      appname:
        description: "App name to generate schemas for. Leave empty for all apps."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-schemas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: github.ref == 'refs/heads/main'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Get Changed Apps
        id: changed-apps
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: apps/*.yaml

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Generate Schemas
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          SCHEMA_TARGETS: ${{ inputs.appname && format('apps/{0}.yaml', inputs.appname) || steps.changed-apps.outputs.all_changed_files || 'apps/*.yaml' }}
        run: |
          chmod +x gen-schemas.sh
          ./gen-schemas.sh $SCHEMA_TARGETS

      - name: Get Schema Diff
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --quiet
          git add -f schemas/
          STAT=$(git diff --cached --stat=200 origin/main -- schemas/)

          echo '### Schema Changes' > /tmp/schema-diff.md
          echo '' >> /tmp/schema-diff.md
          if [ -z "$STAT" ]; then
            echo 'No schema changes detected.' >> /tmp/schema-diff.md
          else
            echo '```' >> /tmp/schema-diff.md
            echo "$STAT" >> /tmp/schema-diff.md
            echo '```' >> /tmp/schema-diff.md
          fi
          echo "${{ github.event.pull_request.number }}" > /tmp/pr-number.txt

      - name: Upload Schema Diff
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: schema-diff
          path: |
            /tmp/schema-diff.md
            /tmp/pr-number.txt

      - name: Commit Changed Schemas
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "200541989+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          git add -f schemas/ crds/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: update schemas"
            git push
          else
            echo "No new schemas to commit."
          fi
