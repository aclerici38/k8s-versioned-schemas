name: generate-schemas

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      appname:
        description: "App name to generate schemas for. Leave empty for all apps."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-schemas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: github.ref == 'refs/heads/main'
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Setup uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          version: "0.10.9"

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Generate Schemas
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          chmod +x gen-schemas.sh
          if [ -n "${{ inputs.appname }}" ]; then
            ./gen-schemas.sh apps/${{ inputs.appname }}.yaml
          else
            ./gen-schemas.sh apps/*.yaml
          fi

      - name: Get Schema Diff
        if: github.event_name == 'pull_request'
        run: |
          git add -f schemas/
          echo '### Schema Changes' > /tmp/schema-diff.md
          echo '' >> /tmp/schema-diff.md
          STAT=$(git diff --cached --stat=200 -- schemas/)
          if [ -z "$STAT" ]; then
            echo 'No schema changes detected.' >> /tmp/schema-diff.md
          else
            echo '```' >> /tmp/schema-diff.md
            echo "$STAT" >> /tmp/schema-diff.md
            echo '```' >> /tmp/schema-diff.md
          fi
          echo "${{ github.event.pull_request.number }}" > /tmp/pr-number.txt

      - name: Upload Schema Diff
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: schema-diff
          path: |
            /tmp/schema-diff.md
            /tmp/pr-number.txt

      - name: Commit Changed Schemas
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "200541989+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          git add -f schemas/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: update schemas [skip ci]"
            git push
          else
            echo "No new schemas to commit."
          fi

      - name: Create Releases for New Versions
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git fetch --tags
          for app_dir in schemas/*/; do
            app_name="$(basename "$app_dir")"

            # Sort app versions
            mapfile -t versions < <(ls -d "$app_dir"*/ | xargs -n1 basename | sort -V)

            for i in "${!versions[@]}"; do
              version="${versions[$i]}"
              tag="${app_name}/${version}"

              if git rev-parse "$tag" >/dev/null 2>&1; then
                continue
              fi

              echo "Creating release: $tag"

              # Find previous version for diff
              body=""
              if [ "$i" -gt 0 ]; then
                prev_version="${versions[$((i - 1))]}"
                diff_output=$(diff -ru "schemas/${app_name}/${prev_version}" "schemas/${app_name}/${version}" || true)
                if [ -n "$diff_output" ]; then
                  body=$(printf "## CRD Schema Changes (from %s)\n\n\`\`\`diff\n%s\n\`\`\`" "$prev_version" "$diff_output")
                else
                  body="No CRD schema changes from ${prev_version}."
                fi
              else
                body="Initial version tracked."
              fi

              gh release create "$tag" \
                --title "${app_name} ${version}" \
                --notes "$body" \
                --target "${{ github.sha }}"
            done
          done
