name: generate-schemas

on:
  push:
    branches:
      - main
    paths:
      - apps/**
  pull_request:
    paths:
      - apps/**
  workflow_dispatch:
    inputs:
      appname:
        description: "App name to generate schemas for. Leave empty for all apps."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          version: "0.10.9"

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Generate Schemas
        run: |
          chmod +x gen-schemas.sh
          if [ -n "${{ inputs.appname }}" ]; then
            ./gen-schemas.sh apps/${{ inputs.appname }}.yaml
          else
            ./gen-schemas.sh apps/*.yaml
          fi

      - name: Get Schema Diff
        if: github.event_name == 'pull_request'
        run: |
          git add -f schemas/
          echo '### Schema Changes' > /tmp/schema-diff.md
          echo '' >> /tmp/schema-diff.md
          STAT=$(git diff --cached --stat=200 -- schemas/)
          if [ -z "$STAT" ]; then
            echo 'No schema changes detected.' >> /tmp/schema-diff.md
          else
            echo '```' >> /tmp/schema-diff.md
            echo "$STAT" >> /tmp/schema-diff.md
            echo '```' >> /tmp/schema-diff.md
          fi

      - name: Comment Schema Diff on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: schema-diff
          path: /tmp/schema-diff.md
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit Changed Schemas
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "200541989+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          git add -f schemas/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: update schemas [skip ci]"
            git push
          else
            echo "No new schemas to commit."
          fi
