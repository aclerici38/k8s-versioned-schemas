name: release-schemas

on:
  push:
    branches: [main]
    paths: ["schemas/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-schemas
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-tags: true
          persist-credentials: false

      - name: Create Releases for New Versions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          for app_dir in schemas/*/; do
            app_name="$(basename "$app_dir")"

            # Sort app versions
            mapfile -t versions < <(ls -d "$app_dir"*/ | xargs -n1 basename | sort -V)

            for i in "${!versions[@]}"; do
              version="${versions[$i]}"
              tag="${app_name}/${version}"

              if git rev-parse "$tag" >/dev/null 2>&1; then
                continue
              fi

              echo "Creating release: $tag"

              # Find previous version for diff
              body=""
              if [ "$i" -gt 0 ]; then
                prev_version="${versions[$((i - 1))]}"
                diff_output=$(diff -ru "schemas/${app_name}/${prev_version}" "schemas/${app_name}/${version}" || true)
                if [ -n "$diff_output" ]; then
                  body=$(printf "## CRD Schema Changes (from %s)\n\n\`\`\`diff\n%s\n\`\`\`" "$prev_version" "$diff_output")
                else
                  body="No CRD schema changes from ${prev_version}."
                fi
              else
                body="Initial version tracked."
              fi

              # GitHub release body API limit is 125000 chars
              max=124000
              if [ "${#body}" -gt "$max" ]; then
                body="${body:0:$max}"$'\n```\n\n_Diff truncated — exceeded GitHub release body limit._'
              fi

              notes_file=$(mktemp)
              printf '%s' "$body" > "$notes_file"

              gh release create "$tag" \
                --title "${app_name} ${version}" \
                --notes-file "$notes_file" \
                --target "${{ github.sha }}" \
                schemas/${app_name}/${version}/*.json

              rm -f "$notes_file"
            done
          done
